services:
  # ─── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: center-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

  # ─── Next.js App ────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: center-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    environment:
      - DATABASE_URL=mongodb://mongo:27017/center_management
    env_file:
      - .env.production

volumes:
  mongo-data:
